name: tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  test:
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install --find-links dist aitviewer
      - name: Setup display (Linux)
        if: runner.os == 'Linux'
        run: |
          export DISPLAY=:0.0
          Xvfb :0 -screen 0 640x480x24 &
      - name: Run tests
        run: pytest tests
      - name: Upload failure images
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-images-${{ matrix.os }}-py${{ matrix.python-version }}
          path: tests/failure/

  publish-testpypi:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip_existing: true

  test-testpypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install from TestPyPI
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install --index-url https://test.pypi.org/simple/ --extra-index-url https://pypi.org/simple/ aitviewer
      - name: Setup display
        run: |
          export DISPLAY=:0.0
          Xvfb :0 -screen 0 640x480x24 &
      - name: Run tests
        run: pytest tests
      - name: Upload failure images
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-images-testpypi
          path: tests/failure/
